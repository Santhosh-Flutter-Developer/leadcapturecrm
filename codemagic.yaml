workflows:
  macos-release:
    name: macOS Release (External Testing)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter doctor
        script: flutter doctor -v

      - name: Get dependencies
        script: flutter pub get

      - name: Enable macOS
        script: flutter config --enable-macos-desktop

      - name: Build macOS release
        script: flutter build macos --release

      - name: Zip .app
        script: |
          cd build/macos/Build/Products/Release
          zip -r AAATP.app.zip AAATP.app

      - name: Install create-dmg
        script: brew install create-dmg

      - name: Create DMG
        script: |
          cd build/macos/Build/Products/Release
          create-dmg \
            --volname "AAATP" \
            "AAATP.dmg" \
            "AAATP.app"

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
      - build/macos/Build/Products/Release/*.dmg
