workflows:
  macos-release:
    name: macOS Release (External Testing)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter doctor
        script: flutter doctor -v

      - name: Get dependencies
        script: flutter pub get

      - name: Enable macOS
        script: flutter config --enable-macos-desktop

      - name: Build macOS release
        script: flutter build macos --release

      - name: Zip .app (auto-detect)
        script: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls *.app | head -n 1)
          echo "Found app: $APP_NAME"
          zip -r "${APP_NAME}.zip" "$APP_NAME"

      - name: Install create-dmg
        script: brew install create-dmg

      - name: Create DMG (auto-detect)
        script: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls *.app | head -n 1)
          echo "Creating DMG for: $APP_NAME"
          create-dmg \
            --volname "${APP_NAME%.app}" \
            "${APP_NAME%.app}.dmg" \
            "$APP_NAME"

    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
      - build/macos/Build/Products/Release/*.dmg
